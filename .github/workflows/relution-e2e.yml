name: Relution Docker E2E

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

jobs:
  relution-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Docker Relution E2E
        timeout-minutes: 20
        run: pnpm test:e2e:relution

      - name: Capture Docker logs
        if: always()
        run: |
          docker compose -p relution-policy-workbench-e2e -f docker-compose.relution-e2e.yml logs --no-color > relution-e2e.log || true

      - name: Upload Docker logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relution-e2e-logs
          path: relution-e2e.log
          if-no-files-found: ignore
